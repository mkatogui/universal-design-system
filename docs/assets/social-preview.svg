<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <!-- Subtle overlay pattern -->
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0"/>
    </radialGradient>
    <!-- Swatch shadow -->
    <filter id="swatchShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <!-- Title shadow -->
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect width="1280" height="640" fill="url(#overlay)"/>

  <!-- Decorative grid dots (subtle) -->
  <g opacity="0.04" fill="#ffffff">
    <circle cx="80" cy="80" r="1.5"/>
    <circle cx="160" cy="80" r="1.5"/>
    <circle cx="240" cy="80" r="1.5"/>
    <circle cx="320" cy="80" r="1.5"/>
    <circle cx="400" cy="80" r="1.5"/>
    <circle cx="480" cy="80" r="1.5"/>
    <circle cx="560" cy="80" r="1.5"/>
    <circle cx="640" cy="80" r="1.5"/>
    <circle cx="720" cy="80" r="1.5"/>
    <circle cx="800" cy="80" r="1.5"/>
    <circle cx="880" cy="80" r="1.5"/>
    <circle cx="960" cy="80" r="1.5"/>
    <circle cx="1040" cy="80" r="1.5"/>
    <circle cx="1120" cy="80" r="1.5"/>
    <circle cx="1200" cy="80" r="1.5"/>
    <circle cx="80" cy="160" r="1.5"/>
    <circle cx="160" cy="160" r="1.5"/>
    <circle cx="240" cy="160" r="1.5"/>
    <circle cx="320" cy="160" r="1.5"/>
    <circle cx="400" cy="160" r="1.5"/>
    <circle cx="480" cy="160" r="1.5"/>
    <circle cx="560" cy="160" r="1.5"/>
    <circle cx="640" cy="160" r="1.5"/>
    <circle cx="720" cy="160" r="1.5"/>
    <circle cx="800" cy="160" r="1.5"/>
    <circle cx="880" cy="160" r="1.5"/>
    <circle cx="960" cy="160" r="1.5"/>
    <circle cx="1040" cy="160" r="1.5"/>
    <circle cx="1120" cy="160" r="1.5"/>
    <circle cx="1200" cy="160" r="1.5"/>
    <circle cx="80" cy="480" r="1.5"/>
    <circle cx="160" cy="480" r="1.5"/>
    <circle cx="240" cy="480" r="1.5"/>
    <circle cx="320" cy="480" r="1.5"/>
    <circle cx="400" cy="480" r="1.5"/>
    <circle cx="480" cy="480" r="1.5"/>
    <circle cx="560" cy="480" r="1.5"/>
    <circle cx="640" cy="480" r="1.5"/>
    <circle cx="720" cy="480" r="1.5"/>
    <circle cx="800" cy="480" r="1.5"/>
    <circle cx="880" cy="480" r="1.5"/>
    <circle cx="960" cy="480" r="1.5"/>
    <circle cx="1040" cy="480" r="1.5"/>
    <circle cx="1120" cy="480" r="1.5"/>
    <circle cx="1200" cy="480" r="1.5"/>
    <circle cx="80" cy="560" r="1.5"/>
    <circle cx="160" cy="560" r="1.5"/>
    <circle cx="240" cy="560" r="1.5"/>
    <circle cx="320" cy="560" r="1.5"/>
    <circle cx="400" cy="560" r="1.5"/>
    <circle cx="480" cy="560" r="1.5"/>
    <circle cx="560" cy="560" r="1.5"/>
    <circle cx="640" cy="560" r="1.5"/>
    <circle cx="720" cy="560" r="1.5"/>
    <circle cx="800" cy="560" r="1.5"/>
    <circle cx="880" cy="560" r="1.5"/>
    <circle cx="960" cy="560" r="1.5"/>
    <circle cx="1040" cy="560" r="1.5"/>
    <circle cx="1120" cy="560" r="1.5"/>
    <circle cx="1200" cy="560" r="1.5"/>
  </g>

  <!-- Decorative corner accents -->
  <line x1="40" y1="40" x2="120" y2="40" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
  <line x1="40" y1="40" x2="40" y2="120" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
  <line x1="1240" y1="600" x2="1160" y2="600" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
  <line x1="1240" y1="600" x2="1240" y2="520" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- UDS icon/logo mark -->
  <g transform="translate(640, 135)" filter="url(#textGlow)">
    <rect x="-28" y="-28" width="56" height="56" rx="12" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="0" y="8" font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">U</text>
  </g>

  <!-- Title -->
  <text x="640" y="230" font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-1.5" filter="url(#textGlow)">Universal Design System</text>

  <!-- Version badge -->
  <g transform="translate(640, 258)">
    <rect x="-30" y="-14" width="60" height="24" rx="12" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
    <text x="0" y="4" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" font-weight="600" fill="#93C5FD" text-anchor="middle">v0.1.0</text>
  </g>

  <!-- Tagline -->
  <text x="640" y="302" font-family="'SF Pro Text', 'Inter', system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#BFDBFE" text-anchor="middle" letter-spacing="0.3">AI-native design system with BM25 reasoning engine</text>

  <!-- Divider line -->
  <line x1="340" y1="340" x2="940" y2="340" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Stats row -->
  <g font-family="'SF Pro Text', 'Inter', system-ui, -apple-system, sans-serif" text-anchor="middle" transform="translate(0, 385)">
    <!-- ~600 Tokens -->
    <text x="280" y="0" font-size="32" font-weight="700" fill="#ffffff">~600</text>
    <text x="280" y="24" font-size="14" font-weight="500" fill="#93C5FD" letter-spacing="1.5" text-transform="uppercase">TOKENS</text>

    <!-- Divider -->
    <line x1="400" y1="-20" x2="400" y2="30" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>

    <!-- 43 Components -->
    <text x="507" y="0" font-size="32" font-weight="700" fill="#ffffff">43</text>
    <text x="507" y="24" font-size="14" font-weight="500" fill="#93C5FD" letter-spacing="1.5">COMPONENTS</text>

    <!-- Divider -->
    <line x1="627" y1="-20" x2="627" y2="30" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>

    <!-- 9 Palettes -->
    <text x="733" y="0" font-size="32" font-weight="700" fill="#ffffff">9</text>
    <text x="733" y="24" font-size="14" font-weight="500" fill="#93C5FD" letter-spacing="1.5">PALETTES</text>

    <!-- Divider -->
    <line x1="840" y1="-20" x2="840" y2="30" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>

    <!-- WCAG AA -->
    <g transform="translate(960, 0)">
      <text x="0" y="-2" font-size="28" font-weight="700" fill="#34D399">AA</text>
      <text x="0" y="24" font-size="14" font-weight="500" fill="#93C5FD" letter-spacing="1.5">WCAG 2.2</text>
    </g>
  </g>

  <!-- Palette swatch strip -->
  <g transform="translate(640, 470)" filter="url(#swatchShadow)">
    <!-- Label -->
    <text x="0" y="-30" font-family="'SF Pro Text', 'Inter', system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#93C5FD" text-anchor="middle" letter-spacing="2">PALETTE SWATCHES</text>

    <!-- 9 swatches, evenly spaced -->
    <!-- Minimal SaaS -->
    <rect x="-216" y="-12" width="24" height="24" rx="4" fill="#2563EB"/>
    <!-- AI Futuristic -->
    <rect x="-162" y="-12" width="24" height="24" rx="4" fill="#00FF88"/>
    <!-- Gradient Startup -->
    <rect x="-108" y="-12" width="24" height="24" rx="4" fill="#7C3AED"/>
    <!-- Corporate -->
    <rect x="-54" y="-12" width="24" height="24" rx="4" fill="#1A365D"/>
    <!-- Apple Minimal -->
    <rect x="0" y="-12" width="24" height="24" rx="4" fill="#0071E3"/>
    <!-- Illustration -->
    <rect x="54" y="-12" width="24" height="24" rx="4" fill="#E8590C"/>
    <!-- Dashboard -->
    <rect x="108" y="-12" width="24" height="24" rx="4" fill="#4F46E5"/>
    <!-- Bold Lifestyle -->
    <rect x="162" y="-12" width="24" height="24" rx="4" fill="#111111" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
    <!-- Minimal Corporate -->
    <rect x="216" y="-12" width="24" height="24" rx="4" fill="#B45309"/>
  </g>

  <!-- Bottom URL -->
  <text x="640" y="578" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="14" font-weight="400" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" letter-spacing="0.5">github.com/mkatogui/universal-design-system</text>

  <!-- Bottom subtle tagline -->
  <text x="640" y="602" font-family="'SF Pro Text', 'Inter', system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff" fill-opacity="0.2" text-anchor="middle" letter-spacing="0.5">Design tokens, reasoning engine, and multi-framework output</text>
</svg>