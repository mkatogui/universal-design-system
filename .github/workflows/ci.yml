name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: npm install

      - name: Validate tokens (W3C DTCG format)
        run: npm run validate

      - name: WCAG contrast audit
        run: npm run audit

      - name: Docs integrity check
        run: npm run verify

      - name: CSV cross-reference validation
        run: npm run sync-data

      - name: Dataset schema validation
        run: test -f scripts/validate-datasets.py && python3 scripts/validate-datasets.py || echo "Skipped (file not found)"

      - name: Expanded contrast audit
        run: test -f scripts/contrast-audit-expanded.py && python3 scripts/contrast-audit-expanded.py || echo "Skipped (file not found)"

      - name: Style Dictionary build
        run: npm run build

      - name: CLI compilation check
        run: cd cli && npm install && npx tsc

      - name: Contract tests
        run: npm run test:contracts

  accessibility:
    name: Accessibility
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for accessibility tests
        id: check
        run: |
          count=$(find tests/accessibility -name '*.spec.ts' 2>/dev/null | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No accessibility test files found, skipping."
          fi

      - name: Setup Node.js
        if: steps.check.outputs.has_tests == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.has_tests == 'true'
        run: npm install

      - name: Install Playwright
        if: steps.check.outputs.has_tests == 'true'
        run: npm install @playwright/test @axe-core/playwright && npx playwright install --with-deps chromium

      - name: Run accessibility tests
        if: steps.check.outputs.has_tests == 'true'
        run: npx playwright test tests/accessibility/
