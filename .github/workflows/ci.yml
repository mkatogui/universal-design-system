name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: npm install

      - name: Validate tokens (W3C DTCG format)
        run: npm run validate

      - name: WCAG contrast audit
        run: npm run audit

      - name: Docs integrity check
        run: npm run verify

      - name: CSV cross-reference validation
        run: npm run sync-data

      - name: Dataset schema validation
        run: test -f scripts/validate-datasets.py && python3 scripts/validate-datasets.py || echo "Skipped (file not found)"

      - name: Expanded contrast audit
        run: test -f scripts/contrast-audit-expanded.py && python3 scripts/contrast-audit-expanded.py || echo "Skipped (file not found)"

      - name: Style Dictionary build
        run: npm run build

      - name: CLI compilation check
        run: cd cli && npm install && npx tsc

      - name: Contract tests
        run: npm run test:contracts

  accessibility:
    name: Accessibility
    runs-on: ubuntu-latest
    needs: validate
    # Use pre-built GHCR image — Chromium + system deps already installed,
    # eliminates the ~2 min `playwright install --with-deps` step on every run.
    container:
      image: ghcr.io/mkatogui/uds-playwright-runner:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for accessibility tests
        id: check
        run: |
          count=$(find tests/accessibility -name '*.spec.ts' 2>/dev/null | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No accessibility test files found, skipping."
          fi

      - name: Install dependencies
        if: steps.check.outputs.has_tests == 'true'
        run: npm install

      - name: Run accessibility tests
        if: steps.check.outputs.has_tests == 'true'
        run: npx playwright test --config=playwright.a11y.config.ts

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    # Use pre-built GHCR image — Chromium + system deps already installed.
    container:
      image: ghcr.io/mkatogui/uds-playwright-runner:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Need write access to push generated snapshots back to the branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for relevant changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
            'docs/' 'tokens/' 'packages/react/' 'tests/visual/' \
            'playwright.visual.config.ts' || true)
          if [ -n "$CHANGED" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            echo "$CHANGED"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No relevant changes detected, skipping visual regression."
          fi

      - name: Install dependencies
        if: steps.changes.outputs.relevant == 'true'
        run: npm install

      - name: Generate / update snapshots
        if: steps.changes.outputs.relevant == 'true'
        # --update-snapshots creates missing baselines and updates changed ones.
        # Playwright marks the test as "failed" the first time a new baseline is
        # written (by design — needs human review). We allow this step to fail so
        # that the next step can commit the freshly-generated snapshots.
        continue-on-error: true
        run: npx playwright test --config=playwright.visual.config.ts --update-snapshots

      - name: Commit generated snapshots back to branch
        if: steps.changes.outputs.relevant == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f tests/visual/__snapshots__/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update visual regression snapshots [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "No snapshot changes to commit."
          fi

      - name: Run visual regression comparison
        if: steps.changes.outputs.relevant == 'true'
        run: npx playwright test --config=playwright.visual.config.ts

      - name: Upload snapshot diffs on failure
        if: failure() && steps.changes.outputs.relevant == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            tests/visual/__snapshots__/
            test-results/
          retention-days: 30
