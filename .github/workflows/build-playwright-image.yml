name: Build Playwright Runner Image

on:
  push:
    branches: [main]
    paths:
      - '.github/docker/Dockerfile.playwright'
      - 'package.json' # rebuild when Playwright version changes
  workflow_dispatch: # allow manual trigger

env:
  IMAGE: ghcr.io/mkatogui/uds-playwright-runner

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Playwright version from package.json
        id: pw_version
        run: |
          VERSION=$(node -e "const d=require('./package.json'); const v=d.devDependencies?.['@playwright/test']||d.dependencies?.['@playwright/test']||'latest'; console.log(v.replace(/[\^~]/,''))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/docker/Dockerfile.playwright
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:v${{ steps.pw_version.outputs.version }}
