name: Bug Report
description: Report a bug in the Universal Design System
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: dropdown
    id: palette
    attributes:
      label: Palette
      description: Which palette were you using when the bug occurred?
      options:
        - minimal-saas
        - ai-futuristic
        - gradient-startup
        - corporate
        - apple-minimal
        - illustration
        - dashboard
        - bold-lifestyle
        - minimal-corporate
        - custom
    validations:
      required: false

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: Which color mode were you using?
      options:
        - light
        - dark
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser were you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: false

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false
