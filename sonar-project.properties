# SonarCloud Configuration
# https://sonarcloud.io/project/overview?id=mkatogui_universal-design-system

sonar.projectKey=mkatogui_universal-design-system
sonar.organization=mkatogui

sonar.sources=cli/src,packages/react/src,src/mcp,packages/tokens/build.js
sonar.tests=tests/components,tests/cli,tests/visual,tests/accessibility

sonar.exclusions=docs/**,node_modules/**,dist/**,build/**,coverage/**,.scannerwork/**,**/*.py,**/*.csv

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# CLI and MCP are tested via integration tests, not unit tests — exclude from coverage metric
sonar.coverage.exclusions=cli/src/**,src/mcp/**,packages/tokens/build.js
sonar.typescript.tsconfigPaths=cli/tsconfig.json,packages/react/tsconfig.json

sonar.sourceEncoding=UTF-8
